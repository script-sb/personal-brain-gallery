name: Deploy gallery to Tencent COS

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "workspace/personal-brain-gallery.html"
      - "workspace/personal-brain-exhibits.json"
      - "workspace/brain-dashboard-data.json"
      - ".github/workflows/deploy-tencent-cos.yml"
      - "brain_core/**"
      - "tests/**"
  workflow_dispatch:

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Check Tencent COS secrets
        id: cos-secrets
        run: |
          if [ -n "$TENCENT_CLOUD_SECRET_ID" ] && [ -n "$TENCENT_CLOUD_SECRET_KEY" ]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Tencent COS secrets are not configured. Skipping deploy."
          fi
        env:
          TENCENT_CLOUD_SECRET_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          TENCENT_CLOUD_SECRET_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}

      - name: Deploy docs to Tencent COS
        if: steps.cos-secrets.outputs.ready == 'true'
        uses: TencentCloud/cos-action@v1
        with:
          secret_id: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          secret_key: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          cos_bucket: personal-brain-gallery-1441292354
          cos_region: ap-guangzhou
          local_path: docs
          remote_path: ""
          clean: true

      - name: Enable Tencent COS static website
        if: steps.cos-secrets.outputs.ready == 'true'
        run: |
          python -m pip install --upgrade awscli
          aws configure set default.s3.addressing_style virtual
          cat > website.json <<'JSON'
          {
            "IndexDocument": {
              "Suffix": "index.html"
            },
            "ErrorDocument": {
              "Key": "index.html"
            }
          }
          JSON
          aws s3api put-bucket-website \
            --endpoint-url "https://cos.ap-guangzhou.myqcloud.com" \
            --bucket "personal-brain-gallery-1441292354" \
            --website-configuration file://website.json \
            --cli-read-timeout 60
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.TENCENT_CLOUD_SECRET_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.TENCENT_CLOUD_SECRET_KEY }}
          AWS_DEFAULT_REGION: ap-guangzhou
          AWS_S3_ADDRESSING_STYLE: virtual
