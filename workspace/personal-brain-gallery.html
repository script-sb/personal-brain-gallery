<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>个人副脑展馆 | Personal Brain Museum</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='10' fill='%23080707'/%3E%3Cpath d='M14 42V14h19c7 0 12 5 12 12s-5 12-12 12H23v4H14Zm9-13h9c3 0 5-1 5-4s-2-4-5-4h-9v8Zm22 13V28h6v14h-6Z' fill='%2342d9ff'/%3E%3Cpath d='M10 50h44' stroke='%23ff7040' stroke-width='4'/%3E%3C/svg%3E">
  <style>
    :root {
      --bg: #080707;
      --surface: rgba(16, 14, 12, 0.72);
      --surface-strong: rgba(19, 14, 11, 0.92);
      --line: rgba(255, 112, 63, 0.34);
      --accent: #ff7040;
      --accent-2: #42d9ff;
      --text: #fff4e9;
      --muted: #b79d8d;
      --warn: #ffb86b;
      --risk: #ff5d5d;
      --font-display: "Avenir Next", "SF Pro Display", "PingFang SC", "Microsoft YaHei", system-ui, sans-serif;
      --font-mono: "SFMono-Regular", "Cascadia Mono", "Roboto Mono", "Menlo", monospace;
      color-scheme: dark;
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-display);
      letter-spacing: 0;
      overflow: hidden;
    }

    body {
      min-height: 100dvh;
      background:
        radial-gradient(circle at 38% 36%, rgba(255, 95, 48, 0.24), transparent 28%),
        radial-gradient(circle at 68% 26%, rgba(66, 217, 255, 0.2), transparent 30%),
        linear-gradient(150deg, #050403 0%, #140d0a 46%, #020708 100%);
    }

    button,
    input {
      font: inherit;
    }

    .museum {
      position: relative;
      min-height: 100dvh;
      isolation: isolate;
    }

    .museum::before,
    .museum::after {
      content: "";
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
    }

    .museum::before {
      background:
        radial-gradient(circle at 38% 42%, rgba(255, 112, 63, 0.28), transparent 24%),
        radial-gradient(circle at 66% 46%, rgba(66, 217, 255, 0.22), transparent 30%),
        radial-gradient(circle at 50% 85%, rgba(255, 184, 107, 0.16), transparent 34%),
        linear-gradient(90deg, rgba(0, 0, 0, 0.68), transparent 28%, transparent 72%, rgba(0, 0, 0, 0.7));
      mix-blend-mode: screen;
    }

    .museum::after {
      background:
        linear-gradient(to bottom, rgba(0, 0, 0, 0.56), transparent 18%, transparent 72%, rgba(0, 0, 0, 0.72)),
        repeating-linear-gradient(to bottom, rgba(255, 255, 255, 0.035) 0 1px, transparent 1px 5px);
      opacity: 0.72;
    }

    #spaceCanvas {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      display: block;
      z-index: 0;
    }

    .grid {
      position: fixed;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background:
        linear-gradient(rgba(255, 112, 63, 0.045) 1px, transparent 1px),
        linear-gradient(90deg, rgba(66, 217, 255, 0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at 50% 42%, black 0%, transparent 86%);
      opacity: 0.52;
    }

    .hud {
      position: relative;
      z-index: 3;
      min-height: 100dvh;
      display: grid;
      grid-template-rows: auto 1fr auto;
      padding: 14px clamp(14px, 2vw, 28px);
      gap: 10px;
      pointer-events: none;
      transition: opacity 260ms ease;
    }

    body[data-ui="idle"] .hud {
      opacity: 0;
      pointer-events: none;
    }

    body[data-ui="idle"] .stage-title {
      opacity: 0.78;
    }

    body[data-ui="active"] .hud,
    body:focus-within .hud {
      opacity: 1;
    }

    .topbar,
    .bottombar {
      pointer-events: auto;
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      align-items: center;
      gap: 12px;
      min-height: 48px;
      border: 1px solid rgba(255, 112, 63, 0.22);
      background: linear-gradient(90deg, rgba(13, 9, 7, 0.34), rgba(58, 23, 13, 0.24), rgba(5, 20, 24, 0.34));
      backdrop-filter: blur(18px) saturate(145%);
      -webkit-backdrop-filter: blur(18px) saturate(145%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 20px 90px rgba(0,0,0,0.14);
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
      padding-left: 12px;
    }

    .mark {
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255, 112, 63, 0.62);
      color: var(--accent);
      background: rgba(255, 112, 63, 0.12);
      font-weight: 800;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    h1,
    h2,
    h3,
    p {
      margin: 0;
    }

    h1 {
      font-size: clamp(16px, 1.6vw, 23px);
      line-height: 1.05;
      font-weight: 760;
    }

    .brand p,
    .status p,
    .bottombar p {
      margin-top: 3px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
    }

    .route-tabs,
    .mode-tabs {
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
    }

    .tab,
    .ghost-button {
      min-height: 34px;
      border: 1px solid rgba(255, 112, 63, 0.34);
      background: rgba(15, 10, 8, 0.72);
      color: var(--text);
      padding: 7px 10px;
      cursor: pointer;
      font-family: var(--font-mono);
      font-size: 11px;
      text-transform: uppercase;
    }

    .tab[aria-pressed="true"],
    .ghost-button[aria-pressed="true"] {
      color: #02101b;
      background: linear-gradient(90deg, var(--accent), var(--warn));
      border-color: rgba(255, 214, 181, 0.86);
    }

    .status {
      justify-self: end;
      text-align: right;
      padding-right: 14px;
      color: var(--accent);
      font-variant-numeric: tabular-nums;
      font-family: var(--font-mono);
      font-size: 12px;
    }

    .layout {
      display: grid;
      grid-template-columns: minmax(220px, 270px) minmax(520px, 1fr) minmax(260px, 320px);
      gap: clamp(10px, 1.2vw, 18px);
      min-height: 0;
      pointer-events: none;
    }

    .panel {
      pointer-events: auto;
      border: 1px solid rgba(255, 112, 63, 0.26);
      background:
        radial-gradient(circle at 30% 0%, rgba(255, 112, 63, 0.12), transparent 42%),
        radial-gradient(circle at 82% 20%, rgba(66, 217, 255, 0.06), transparent 46%),
        rgba(10, 8, 7, 0.42);
      backdrop-filter: blur(20px) saturate(155%);
      -webkit-backdrop-filter: blur(20px) saturate(155%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 22px 70px rgba(0,0,0,0.22);
      clip-path: polygon(0 0, calc(100% - 16px) 0, 100% 16px, 100% 100%, 16px 100%, 0 calc(100% - 16px));
      overflow: hidden;
    }

    .layout > .panel:first-child {
      align-self: end;
      max-height: min(64dvh, 660px);
    }

    .layout > .panel:last-child {
      align-self: center;
      max-height: min(68dvh, 700px);
    }

    .panel-inner {
      padding: 12px;
      display: grid;
      gap: 10px;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 11px;
      font-weight: 760;
      text-transform: uppercase;
    }

    .panel-title span:last-child {
      color: var(--muted);
      font-weight: 620;
    }

    .exhibit-list {
      display: grid;
      gap: 7px;
      max-height: calc(64dvh - 54px);
      overflow: auto;
      padding-right: 2px;
    }

    .exhibit-card {
      display: grid;
      gap: 5px;
      width: 100%;
      text-align: left;
      border: 1px solid rgba(255, 112, 63, 0.2);
      background:
        linear-gradient(135deg, rgba(255, 112, 63, 0.09), transparent 42%),
        rgba(12, 8, 7, 0.46);
      color: var(--text);
      padding: 10px;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .exhibit-card:hover,
    .exhibit-card.is-active {
      border-color: var(--accent);
      background:
        linear-gradient(135deg, color-mix(in srgb, var(--accent) 22%, transparent), transparent 54%),
        rgba(38, 16, 9, 0.72);
      transform: translateY(-1px);
      box-shadow: 0 0 26px color-mix(in srgb, var(--accent) 22%, transparent);
    }

    .exhibit-card:active {
      transform: translateY(1px);
    }

    .card-meta {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 10px;
    }

    .exhibit-card h2 {
      font-size: 14px;
      line-height: 1.25;
      font-weight: 720;
    }

    .exhibit-card p {
      color: var(--muted);
      font-size: 11px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .center-space {
      position: relative;
      min-height: calc(100dvh - 132px);
    }

    .stage-title {
      position: absolute;
      left: 50%;
      top: 24px;
      z-index: 3;
      width: min(520px, 86%);
      transform: translateX(-50%);
      pointer-events: none;
      text-align: center;
      text-shadow: 0 0 22px rgba(255, 112, 63, 0.5), 0 0 28px rgba(66, 217, 255, 0.3);
      transition: opacity 260ms ease;
    }

    .stage-title strong {
      display: block;
      color: var(--text);
      font-size: clamp(22px, 2.5vw, 38px);
      line-height: 1;
      letter-spacing: 0;
      font-weight: 780;
    }

    .stage-title span {
      display: block;
      margin-top: 8px;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.35;
      display: -webkit-box;
      -webkit-line-clamp: 1;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .reticle {
      position: absolute;
      inset: 10%;
      z-index: 2;
      pointer-events: none;
      border: 1px solid rgba(103, 217, 255, 0.08);
      opacity: 0.72;
    }

    .reticle::before,
    .reticle::after {
      content: "";
      position: absolute;
      background: rgba(103, 217, 255, 0.16);
    }

    .reticle::before {
      left: 50%;
      top: 0;
      width: 1px;
      height: 100%;
    }

    .reticle::after {
      top: 50%;
      left: 0;
      width: 100%;
      height: 1px;
    }

    .agent {
      position: absolute;
      left: 50%;
      bottom: 16px;
      z-index: 4;
      width: min(560px, 86%);
      transform: translateX(-50%);
      pointer-events: auto;
    }

    .agent-box {
      display: grid;
      gap: 8px;
      border: 1px solid rgba(103, 217, 255, 0.22);
      background:
        linear-gradient(135deg, rgba(255, 112, 63, 0.14), rgba(16, 11, 9, 0.72) 36%, rgba(4, 16, 19, 0.82)),
        rgba(13, 9, 7, 0.72);
      padding: 10px;
      backdrop-filter: blur(22px) saturate(155%);
      -webkit-backdrop-filter: blur(22px) saturate(155%);
      box-shadow: 0 24px 90px rgba(0, 0, 0, 0.34), inset 0 1px 0 rgba(255,255,255,0.1);
    }

    .agent-box h2 {
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 12px;
      text-transform: uppercase;
    }

    .agent-box p {
      color: var(--muted);
      font-size: 12px;
      line-height: 1.38;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .agent-input {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .agent-input input {
      min-height: 34px;
      border: 1px solid rgba(103, 217, 255, 0.26);
      background: rgba(1, 8, 15, 0.72);
      color: var(--text);
      padding: 7px 10px;
      outline: none;
      font-size: 12px;
    }

    .agent-input input:focus {
      border-color: var(--accent);
    }

    .detail {
      display: grid;
      gap: 12px;
    }

    .detail-hero {
      border-left: 3px solid var(--accent);
      padding-left: 10px;
    }

    .detail-hero h2 {
      font-size: clamp(22px, 2.1vw, 34px);
      line-height: 1.08;
      font-weight: 760;
    }

    .detail-hero p {
      margin-top: 8px;
      color: var(--muted);
      line-height: 1.42;
      font-size: 12px;
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .info-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 8px;
    }

    .info {
      border: 1px solid rgba(103, 217, 255, 0.18);
      background: rgba(1, 8, 15, 0.38);
      padding: 9px;
      min-height: 58px;
    }

    .info strong {
      display: block;
      color: var(--accent);
      font-family: var(--font-mono);
      font-size: 10px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }

    .info span {
      color: var(--text);
      font-size: 12px;
      line-height: 1.35;
    }

    .presence {
      display: grid;
      gap: 8px;
    }

    .visitor {
      display: grid;
      grid-template-columns: 28px 1fr auto;
      gap: 8px;
      align-items: center;
      padding: 8px;
      border: 1px solid rgba(103, 217, 255, 0.16);
      background: rgba(1, 8, 15, 0.46);
      font-size: 12px;
    }

    .avatar {
      width: 24px;
      height: 24px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(103, 217, 255, 0.35);
      color: var(--accent);
      background: rgba(103, 217, 255, 0.08);
      font-weight: 800;
      font-size: 11px;
    }

    .visitor span {
      color: var(--muted);
      font-size: 11px;
    }

    .visitor em {
      color: var(--accent-2);
      font-style: normal;
      font-size: 11px;
    }

    .bottombar {
      grid-template-columns: 1fr auto;
      min-height: 36px;
      padding: 0 12px;
      color: var(--muted);
      font-size: 11px;
      background: rgba(2, 8, 14, 0.3);
    }

    .bottombar strong {
      color: var(--accent);
      font-weight: 650;
    }

    body[data-motion="low"] #spaceCanvas {
      opacity: 0.52;
    }

    body[data-view="immersive"] .layout {
      grid-template-columns: minmax(0, 0.12fr) minmax(560px, 1fr) minmax(0, 0.12fr);
    }

    body[data-view="immersive"] .stage-title {
      top: 56px;
      width: min(460px, 82%);
      opacity: 0.82;
    }

    body[data-view="immersive"] .stage-title strong {
      font-size: clamp(20px, 2vw, 31px);
    }

    body[data-view="immersive"] .stage-title span {
      font-size: 11px;
    }

    body[data-view="immersive"] .layout > .panel {
      opacity: 0.1;
      transform: scale(0.94);
      filter: blur(0.4px);
      pointer-events: auto;
      transition: opacity 180ms ease, transform 180ms ease, filter 180ms ease;
    }

    body[data-view="immersive"] .layout > .panel:hover,
    body[data-view="immersive"] .layout > .panel:focus-within {
      opacity: 0.9;
      transform: scale(1);
      filter: none;
    }

    body[data-view="immersive"] .topbar,
    body[data-view="immersive"] .bottombar {
      opacity: 0.32;
      transition: opacity 180ms ease;
    }

    body[data-view="immersive"] .topbar:hover,
    body[data-view="immersive"] .bottombar:hover {
      opacity: 1;
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        scroll-behavior: auto !important;
      }
    }

    @media (max-width: 1120px) {
      body {
        overflow: auto;
      }

      .hud {
        min-height: 100dvh;
        gap: 12px;
      }

      .layout {
        grid-template-columns: 1fr;
      }

      .layout > .panel:first-child {
        order: 2;
        align-self: stretch;
        max-height: none;
      }

      .center-space {
        order: 1;
      }

      .layout > .panel:last-child {
        order: 3;
        align-self: stretch;
        max-height: none;
      }

      body[data-view="immersive"] .layout {
        grid-template-columns: 1fr;
      }

      body[data-view="immersive"] .layout > .panel {
        opacity: 0.86;
        transform: none;
        filter: none;
      }

      .center-space {
        min-height: 600px;
      }

      .exhibit-list {
        max-height: none;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 720px) {
      .hud {
        padding: 12px;
      }

      .topbar,
      .bottombar {
        grid-template-columns: 1fr;
        padding: 10px;
      }

      .topbar {
        gap: 10px;
        background: linear-gradient(135deg, rgba(9, 8, 7, 0.96), rgba(24, 12, 8, 0.92), rgba(4, 14, 18, 0.96));
        border-color: rgba(255, 112, 63, 0.38);
      }

      .brand p,
      .status {
        display: none;
      }

      h1 {
        font-size: 17px;
      }

      .mark {
        width: 28px;
        height: 28px;
      }

      .brand,
      .status {
        padding: 0;
        justify-self: start;
        text-align: left;
      }

      .route-tabs,
      .mode-tabs {
        justify-content: start;
      }

      .route-tabs {
        gap: 6px;
      }

      .tab,
      .ghost-button {
        min-height: 30px;
        padding: 6px 8px;
        font-size: 10px;
      }

      .center-space {
        min-height: 620px;
      }

      .stage-title {
        top: 16px;
        width: min(420px, 92%);
      }

      .stage-title strong {
        font-size: clamp(24px, 8vw, 36px);
      }

      .agent {
        width: calc(100% - 22px);
        bottom: 12px;
      }

      .exhibit-list,
      .info-grid {
        grid-template-columns: 1fr;
      }

      .agent-input {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body data-motion="full" data-view="immersive" data-ui="active">
  <div class="museum">
    <canvas id="spaceCanvas" aria-hidden="true"></canvas>
    <div class="grid" aria-hidden="true"></div>

    <main class="hud">
      <header class="topbar">
        <div class="brand">
          <div class="mark">PB</div>
          <div>
            <h1>个人副脑展馆</h1>
            <p>展品协议驱动的动态展示网站</p>
          </div>
        </div>
        <nav class="route-tabs" aria-label="导览路线" id="routeTabs"></nav>
        <div class="status">
          <strong id="clock">--:--:--</strong>
          <p id="routeSummary">正在载入展馆协议</p>
        </div>
      </header>

      <section class="layout" aria-label="个人副脑展馆">
        <aside class="panel">
          <div class="panel-inner">
            <div class="panel-title"><span>展品协议</span><span id="exhibitCount">0 ITEMS</span></div>
            <div class="exhibit-list" id="exhibitList"></div>
          </div>
        </aside>

        <section class="center-space" aria-label="3D 深空展馆">
          <div class="stage-title">
            <strong id="stageTitle">Jarvis 对话中枢</strong>
            <span id="stageSubtitle">点击展品或地面让导览小人前往，也可以用 WASD 移动。</span>
          </div>
          <div class="reticle"></div>
          <div class="agent">
            <div class="agent-box">
              <h2>Agent 导览台</h2>
              <p id="agentText">点击 3D 展品或地面移动导览小人，靠近模块后自动展开说明。</p>
              <form class="agent-input" id="agentForm">
                <input id="agentQuery" autocomplete="off" aria-label="导览问题" placeholder="例如：我想了解安全边界，或从 GitHub 能力开始">
                <button class="ghost-button" type="submit">导览</button>
              </form>
            </div>
          </div>
        </section>

        <aside class="panel">
          <div class="panel-inner detail">
            <div class="panel-title"><span>当前展品</span><span id="activeId">未选择</span></div>
            <div class="detail-hero">
              <h2 id="detailTitle">正在载入</h2>
              <p id="detailDescription">读取本地展品协议中。</p>
            </div>
            <div class="info-grid">
              <div class="info"><strong>状态</strong><span id="detailStatus">-</span></div>
              <div class="info"><strong>风险</strong><span id="detailRisk">-</span></div>
              <div class="info"><strong>工具</strong><span id="detailTools">-</span></div>
              <div class="info"><strong>过程</strong><span id="detailProcess">-</span></div>
            </div>
            <div class="panel-title"><span>在线感</span><span>模拟 presence</span></div>
            <div class="presence" id="presenceList"></div>
            <div class="mode-tabs">
              <button class="ghost-button" id="motionToggle" type="button" aria-pressed="false">低动效</button>
              <button class="ghost-button" id="immersiveToggle" type="button" aria-pressed="true">显示面板</button>

    function labelTexture(title, subtitle, color) {
      const canvas = document.createElement("canvas");
      canvas.width = 640;
      canvas.height = 300;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
      gradient.addColorStop(0, "rgba(103, 217, 255, 0.2)");
      gradient.addColorStop(0.32, "rgba(2, 9, 18, 0.82)");
      gradient.addColorStop(1, "rgba(0, 4, 9, 0.92)");
      ctx.fillStyle = gradient;
      roundRect(ctx, 12, 12, canvas.width - 24, canvas.height - 24, 26);
      ctx.fill();
      ctx.strokeStyle = color;
      ctx.lineWidth = 6;
      roundRect(ctx, 12, 12, canvas.width - 24, canvas.height - 24, 26);
      ctx.stroke();
      ctx.fillStyle = "#e9fbff";
      ctx.shadowColor = color;
      ctx.shadowBlur = 22;
      ctx.font = "760 52px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.fillText(title, 42, 112);
      ctx.shadowBlur = 0;
      ctx.fillStyle = "#8eadbf";
      ctx.font = "400 28px -apple-system, BlinkMacSystemFont, sans-serif";
      wrapText(ctx, subtitle, 42, 166, 540, 38);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }

    function glowTexture(color = "#67d9ff") {
      const canvas = document.createElement("canvas");
      canvas.width = 256;
      canvas.height = 256;
      const ctx = canvas.getContext("2d");
      const gradient = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
      gradient.addColorStop(0, "rgba(255,255,255,0.95)");
      gradient.addColorStop(0.16, color);
      gradient.addColorStop(0.48, "rgba(103,217,255,0.22)");
      gradient.addColorStop(1, "rgba(0,0,0,0)");
      ctx.fillStyle = gradient;
      ctx.fillRect(0, 0, 256, 256);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function guideLabelTexture() {
      const canvas = document.createElement("canvas");
      canvas.width = 220;
      canvas.height = 92;
      const ctx = canvas.getContext("2d");
      ctx.fillStyle = "rgba(2, 14, 18, 0.72)";
      roundRect(ctx, 18, 18, 184, 52, 16);
      ctx.fill();
      ctx.strokeStyle = "rgba(66, 217, 255, 0.86)";
      ctx.lineWidth = 3;
      roundRect(ctx, 18, 18, 184, 52, 16);
      ctx.stroke();
      ctx.fillStyle = "#e9fbff";
      ctx.shadowColor = "#42d9ff";
      ctx.shadowBlur = 16;
      ctx.font = "760 28px -apple-system, BlinkMacSystemFont, sans-serif";
      ctx.textAlign = "center";
      ctx.fillText("YOU", 110, 54);
      const texture = new THREE.CanvasTexture(canvas);
      texture.colorSpace = THREE.SRGBColorSpace;
      return texture;
    }

    function wrapText(ctx, text, x, y, maxWidth, lineHeight) {
      const words = String(text).split("");
      let lineText = "";
      for (const word of words) {
        const test = lineText + word;
        if (ctx.measureText(test).width > maxWidth && lineText) {
          ctx.fillText(lineText, x, y);
          lineText = word;
          y += lineHeight;
        } else {
          lineText = test;
        }
      }
      ctx.fillText(lineText, x, y);
    }

    function addCinematicBackdrop() {

    function addStarField() {
      const count = 920;
      const positions = new Float32Array(count * 3);
      for (let i = 0; i < count; i++) {
        const radius = 5 + Math.random() * 22;
        const angle = Math.random() * Math.PI * 2;
        positions[i * 3] = Math.cos(angle) * radius;
        positions[i * 3 + 1] = Math.random() * 9.5 - 0.6;
        positions[i * 3 + 2] = Math.sin(angle) * radius - 8;
      }
      const geometry = new THREE.BufferGeometry();
      geometry.setAttribute("position", new THREE.BufferAttribute(positions, 3));
      starField = new THREE.Points(
        geometry,
        new THREE.PointsMaterial({
          color: 0x42d9ff,
          size: 0.035,
          transparent: true,
          opacity: 0.7,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      world.add(starField);

      const emberCount = 520;
      const emberPositions = new Float32Array(emberCount * 3);
      for (let i = 0; i < emberCount; i++) {
        emberPositions[i * 3] = (Math.random() - 0.5) * 28;
        emberPositions[i * 3 + 1] = Math.random() * 7.2 - 0.4;
        emberPositions[i * 3 + 2] = -16 + Math.random() * 22;
      }
      const emberGeometry = new THREE.BufferGeometry();
      emberGeometry.setAttribute("position", new THREE.BufferAttribute(emberPositions, 3));
      emberField = new THREE.Points(
        emberGeometry,
        new THREE.PointsMaterial({
          color: 0xff7040,
          size: 0.052,
          transparent: true,
          opacity: 0.58,
          depthWrite: false,
          blending: THREE.AdditiveBlending
        })
      );
      world.add(emberField);

      const dataCount = 84;
      const dataPositions = new Float32Array(dataCount * 6);
      for (let i = 0; i < dataCount; i++) {
        const x = (Math.random() - 0.5) * 24;
        const y = 1.1 + Math.random() * 6.2;
        const z = -15 + Math.random() * 21;
        const len = 0.35 + Math.random() * 1.2;
        dataPositions[i * 6] = x;
        dataPositions[i * 6 + 1] = y;
        dataPositions[i * 6 + 2] = z;
        dataPositions[i * 6 + 3] = x + len;
        dataPositions[i * 6 + 4] = y + Math.random() * 0.18;
        dataPositions[i * 6 + 5] = z - len * 0.55;
      }
      const dataGeometry = new THREE.BufferGeometry();
      dataGeometry.setAttribute("position", new THREE.BufferAttribute(dataPositions, 3));
      dataField = new THREE.LineSegments(
        dataGeometry,
        new THREE.LineBasicMaterial({
          color: 0x42d9ff,
          transparent: true,
          opacity: 0.36,
          blending: THREE.AdditiveBlending
        })
      );
      world.add(dataField);
    }

      group.lookAt(camera.position.x, group.position.y, camera.position.z);

      exhibitGroups[index] = group;
      world.add(group);

    function renderRoutes() {
      els.routeTabs.innerHTML = "";
      data.routes.forEach((route) => {
        const button = document.createElement("button");
        button.className = "tab";
        button.type = "button";
        button.textContent = `${route.label} ${route.minutes}min`;
        button.setAttribute("aria-pressed", String(route.id === activeRoute));
        button.addEventListener("click", () => setRoute(route.id));
        els.routeTabs.appendChild(button);
      });

    function renderCards() {
      els.exhibitList.innerHTML = "";
      els.exhibitCount.textContent = `${data.exhibits.length} ITEMS`;
      data.exhibits.forEach((exhibit, index) => {
        const button = document.createElement("button");
        button.className = "exhibit-card";
        button.type = "button";
        button.innerHTML = `
          <div class="card-meta"><span>${escapeHtml(exhibit.id)} / ${escapeHtml(exhibit.type)}</span><span>${escapeHtml(exhibit.status)}</span></div>
          <h2>${escapeHtml(exhibit.title)}</h2>
          <p>${escapeHtml(exhibit.description)}</p>
        `;
        button.addEventListener("click", () => sendGuideToExhibit(index, true));
        els.exhibitList.appendChild(button);
      });
    }

    function renderPresence() {
      const names = [
        ["你", "正在参观当前模块", "LIVE"],
        ["访客 A", "查看展品协议", "VIEW"],
        ["访客 B", "停留在权限门", "SAFE"],
        ["Agent", "生成导览路线", "PLAN"]
      ];
      els.presenceList.innerHTML = names.map(([name, action, state]) => `
        <div class="visitor">
          <div class="avatar">${escapeHtml(name[0])}</div>
          <div><strong>${escapeHtml(name)}</strong><br><span>${escapeHtml(action)}</span></div>
          <em>${escapeHtml(state)}</em>
        </div>
      `).join("");
    }

    function activate(index, moveCamera) {
      activeIndex = (index + data.exhibits.length) % data.exhibits.length;
      const exhibit = data.exhibits[activeIndex];
      document.querySelectorAll(".exhibit-card").forEach((card, i) => card.classList.toggle("is-active", i === activeIndex));
      els.activeId.textContent = exhibit.id;
      els.detailTitle.textContent = exhibit.title;
      els.detailDescription.textContent = exhibit.description;
      els.detailStatus.textContent = exhibit.status;
      els.detailRisk.textContent = exhibit.risk;
      els.detailTools.textContent = exhibit.tools.join(" / ");
      els.detailProcess.textContent = exhibit.process;
      els.stageTitle.textContent = exhibit.title;
      els.stageSubtitle.textContent = exhibit.description;
      els.agentText.textContent = `当前导览到「${exhibit.title}」。${exhibit.process}`;
      document.documentElement.style.setProperty("--accent", exhibit.color || "#67d9ff");
      exhibitGroups.forEach((group, i) => {
        if (!group) return;
        group.userData.active = i === activeIndex;
      });
      if (activeBeam) {
        activeBeam.material.color.set(exhibit.color || "#67d9ff");
      }
      if (moveCamera) focusExhibit(exhibit);
    }

    function focusExhibit(exhibit) {
      const p = new THREE.Vector3(exhibit.position[0], exhibit.position[1], exhibit.position[2]);
      targetLook.copy(p);
      targetCamera.set(p.x * 0.42, Math.max(3.2, p.y + 2.6), p.z + 7.4);
    }

    function sendGuideToExhibit(index, moveCamera) {
      const exhibit = data.exhibits[(index + data.exhibits.length) % data.exhibits.length];
      if (!exhibit || !guide) return;
      const p = new THREE.Vector3(exhibit.position[0], 0.22, exhibit.position[2] + 2.85);
      guideTarget.copy(clampWalkTarget(p));
      guideDestinationIndex = (index + data.exhibits.length) % data.exhibits.length;
      els.agentText.textContent = `导览小人正在前往「${exhibit.title}」。靠近展品后会自动展开说明。`;
      if (moveCamera) {
        targetLook.set(exhibit.position[0], 1.25, exhibit.position[2]);
        targetCamera.set(exhibit.position[0] * 0.34, 4.4, exhibit.position[2] + 8.4);
      }
      revealUi();
    }

    function clampWalkTarget(point) {
      point.x = Math.max(-9.8, Math.min(9.8, point.x));
      point.y = 0.22;
      point.z = Math.max(-13.2, Math.min(3.8, point.z));
      return point;
    }

    function guideArrived() {
      if (!guide || guideDestinationIndex === null) return;
      const distance = guide.position.distanceTo(guideTarget);
      if (distance > 0.34) return;
      const arrivedIndex = guideDestinationIndex;
      guideDestinationIndex = null;
      activate(arrivedIndex, true);
    }

    function resetCamera() {
      targetCamera.set(0, 5.8, 13.8);
      targetLook.set(0, 1.5, -6.8);
      if (guide) {
        guideTarget.set(0, 0.22, -4.8);
        guideDestinationIndex = 0;
      }
      activate(0, false);
    }

    function setRoute(routeId) {
      activeRoute = routeId;
      const route = data.routes.find((item) => item.id === routeId) || data.routes[0];
      els.routeSummary.textContent = route ? route.summary : "本地导览路线";
      renderRoutes();
      const routeMap = { quick: 0, builder: 1, research: 4 };
      sendGuideToExhibit(routeMap[routeId] || 0, true);
    }

    function inferQuery(query) {
      const text = query.toLowerCase();
      const pairs = [
        ["安全 权限 确认 risk gateway", "pb-006"],
        ["github 开源 镜像 mirror repo", "pb-005"],
        ["记忆 memory 偏好", "pb-002"],
        ["上下文 context 文件 代码", "pb-003"],
        ["工具 浏览器 devtools terminal", "pb-004"],
        ["jarvis 对话 任务 计划", "pb-001"]
      ];
      const hit = pairs.find(([keys]) => keys.split(" ").some((key) => text.includes(key)));
      const id = hit ? hit[1] : "pb-001";
      const index = data.exhibits.findIndex((item) => item.id === id);
      sendGuideToExhibit(index >= 0 ? index : 0, true);
    }

    function revealUi(duration = 3200) {
      document.body.dataset.ui = "active";
      clearTimeout(uiTimer);
      uiTimer = window.setTimeout(() => {
        if (document.activeElement && ["INPUT", "BUTTON"].includes(document.activeElement.tagName)) return;
        document.body.dataset.ui = "idle";
      }, duration);
    }

    function resize() {
      const w = window.innerWidth;
      const h = window.innerHeight;
      renderer.setSize(w, h, false);
      camera.aspect = w / h;
      camera.updateProjectionMatrix();
    }

    function pointerToWorld(event) {
      const rect = renderer.domElement.getBoundingClientRect();
      pointerNdc.x = ((event.clientX - rect.left) / rect.width) * 2 - 1;
      pointerNdc.y = -((event.clientY - rect.top) / rect.height) * 2 + 1;
      raycaster.setFromCamera(pointerNdc, camera);

      const hits = raycaster.intersectObjects(world.children, true);
      const exhibitHit = hits.map((hit) => findExhibitGroup(hit.object)).find(Boolean);
      if (exhibitHit) {
        sendGuideToExhibit(exhibitHit.userData.index, true);
        return true;
      }

      const floorPoint = new THREE.Vector3();
      if (raycaster.ray.intersectPlane(walkPlane, floorPoint)) {
        guideTarget.copy(clampWalkTarget(floorPoint));
        guideDestinationIndex = nearestExhibitIndex(guideTarget);
        const exhibit = data.exhibits[guideDestinationIndex];
        els.agentText.textContent = exhibit
          ? `导览小人正在移动。靠近「${exhibit.title}」后会自动展示。`
          : "导览小人正在移动。";
        targetLook.copy(guideTarget).add(new THREE.Vector3(0, 0.9, -0.4));
        return true;
      }
      return false;
    }

    function findExhibitGroup(object) {
      let node = object;
      while (node) {
        if (node.userData && node.userData.index !== undefined) return node;
        node = node.parent;
      }
      return null;
    }

    function nearestExhibitIndex(point) {
      if (!data.exhibits.length) return null;
      let bestIndex = 0;
      let bestDistance = Infinity;
      data.exhibits.forEach((exhibit, index) => {
        const dx = exhibit.position[0] - point.x;
        const dz = exhibit.position[2] - point.z;
        const distance = Math.hypot(dx, dz);
        if (distance < bestDistance) {
          bestDistance = distance;
          bestIndex = index;
        }
      });
      return bestDistance < 2.8 ? bestIndex : null;
    }

    function updateGuide(lowMotion, t) {
      if (!guide) return;
      const manual = getManualDirection();
      if (manual.lengthSq() > 0) {
        manual.normalize().multiplyScalar(lowMotion ? 0.045 : 0.085);
        guideTarget.copy(clampWalkTarget(guide.position.clone().add(manual)));
        guideDestinationIndex = nearestExhibitIndex(guideTarget);
      }

      const delta = guideTarget.clone().sub(guide.position);
      const distance = delta.length();
      if (distance > 0.01) {
        const step = Math.min(distance, lowMotion ? 0.035 : 0.07);
        delta.normalize();
        guide.position.add(delta.multiplyScalar(step));
        guide.rotation.y = Math.atan2(delta.x, delta.z);
      }

      guide.children.forEach((part) => {
        if (part.userData.guideAura) {
          part.rotation.z = t * (lowMotion ? 0.7 : 1.5);
          part.material.opacity = 0.54 + Math.sin(t * 2.4) * 0.16;
        }
        if (part.userData.guideBeacon) {
          const pulse = 1.65 + Math.sin(t * 3.1) * 0.24;
          part.scale.set(pulse, pulse, 1);
        }
        if (part.userData.guideMast) {
          part.material.opacity = 0.54 + Math.sin(t * 4.2) * 0.22;
        }
      });

      if (guideTrail) {
        guideTrail.geometry.setFromPoints([
          guide.position.clone().setY(0.08),
          guideTarget.clone().setY(0.08)
        ]);
      }

      if (guideDestinationIndex !== null) guideArrived();
    }

    function getManualDirection() {
      const direction = new THREE.Vector3();
      if (keys.has("w") || keys.has("arrowup")) direction.z -= 1;
      if (keys.has("s") || keys.has("arrowdown")) direction.z += 1;
      if (keys.has("a") || keys.has("arrowleft")) direction.x -= 1;
      if (keys.has("d") || keys.has("arrowright")) direction.x += 1;
      return direction;
    }

    function animate(time) {
      const lowMotion = document.body.dataset.motion === "low" || window.matchMedia("(prefers-reduced-motion: reduce)").matches;
      const t = time * 0.001;
      pointer.x += (pointer.tx - pointer.x) * 0.04;
      pointer.y += (pointer.ty - pointer.y) * 0.04;
      camera.position.lerp(targetCamera, lowMotion ? 0.02 : 0.045);
      const look = targetLook.clone();
      look.x += pointer.x * 0.28;
      look.y += pointer.y * 0.14;
      camera.lookAt(look);
      if (starField) {
        starField.rotation.y = t * (lowMotion ? 0.012 : 0.035);
      }
      if (emberField) {
        emberField.rotation.y = -t * (lowMotion ? 0.01 : 0.026);
        const arr = emberField.geometry.attributes.position.array;
        for (let i = 1; i < arr.length; i += 3) {
          arr[i] += lowMotion ? 0.0005 : 0.0024;
          if (arr[i] > 7.2) arr[i] = -0.4;
        }
        emberField.geometry.attributes.position.needsUpdate = true;
      }
      if (dataField) {
        dataField.position.x = Math.sin(t * 0.18) * 0.38;
        dataField.position.z = Math.cos(t * 0.14) * 0.44;
        dataField.material.opacity = (lowMotion ? 0.18 : 0.34) + Math.sin(t * 1.7) * 0.05;
      }
      if (activeBeam) {
        activeBeam.rotation.y = Math.sin(t * 0.3) * 0.08;
        activeBeam.material.opacity = (lowMotion ? 0.08 : 0.13) + Math.sin(t * 1.3) * 0.025;
      }
      updateGuide(lowMotion, t);
      world.children.forEach((child) => {
        if (child.userData.presence) {
          child.position.y = 0.34 + Math.sin(t * 1.8 + child.position.x) * 0.06;
        }
        if (child.userData.index !== undefined) {
          const lift = child.userData.active ? 0.18 : 0;
          child.position.y = child.userData.baseY + lift + Math.sin(t * 1.5 + child.userData.index) * (lowMotion ? 0.025 : 0.07);
          const targetScale = child.userData.active ? 1.26 : 0.86;
          child.scale.lerp(new THREE.Vector3(targetScale, targetScale, targetScale), 0.08);
          child.lookAt(camera.position.x, child.position.y, camera.position.z);
          child.children.forEach((part) => {
            if (part.userData.halo) {
              part.rotation.z = t * (child.userData.active ? 0.9 : 0.32);
              part.material.opacity = child.userData.active ? 0.92 : 0.48;
            }
            if (part.userData.glow) {
              const pulse = child.userData.active ? 3.0 + Math.sin(t * 2.1) * 0.28 : 1.8;
              part.scale.set(pulse, pulse, 1);
              part.material.opacity = child.userData.active ? 0.46 : 0.18;
            }
          });
        }
      });
      pulseLights.forEach((light, index) => {
        light.intensity = (index === 0 ? 6.4 : 2.8) + Math.sin(t * 1.7 + index) * 0.42;
      });
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    function escapeHtml(value) {
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    async function loadData() {
      const fallback = {
        routes: [{ id: "quick", label: "快速认识", minutes: 5, summary: "使用内置默认展馆数据。" }],
        exhibits: []
      };
      try {
        const response = await fetch("personal-brain-exhibits.json", { cache: "no-store" });
        data = response.ok ? await response.json() : fallback;
      } catch {
        data = fallback;
      }
      renderRoutes();
      renderCards();
      renderPresence();
      buildHall();
      setRoute(data.routes[0]?.id || "quick");
    }

    els.agentForm.addEventListener("submit", (event) => {
      event.preventDefault();
      inferQuery(els.agentQuery.value.trim());
    });
    els.motionToggle.addEventListener("click", () => {
      const next = document.body.dataset.motion === "low" ? "full" : "low";
      document.body.dataset.motion = next;
      els.motionToggle.setAttribute("aria-pressed", String(next === "low"));
    });
    els.immersiveToggle.addEventListener("click", () => {
      const enabled = document.body.dataset.view !== "immersive";
      document.body.dataset.view = enabled ? "immersive" : "standard";
      els.immersiveToggle.setAttribute("aria-pressed", String(enabled));
      els.immersiveToggle.textContent = enabled ? "显示面板" : "隐藏面板";
      revealUi();
    });
    els.resetCamera.addEventListener("click", resetCamera);
    window.addEventListener("resize", resize);
    els.canvas.addEventListener("pointerdown", (event) => {
      pointerToWorld(event);
      revealUi();
    });
    window.addEventListener("pointermove", (event) => {
      pointer.tx = (event.clientX / window.innerWidth - 0.5) * 2;
      pointer.ty = (0.5 - event.clientY / window.innerHeight) * 2;
      revealUi();
    });
    window.addEventListener("pointerdown", () => revealUi());
    window.addEventListener("keydown", () => revealUi());
    window.addEventListener("focusin", () => revealUi(6000));
    window.addEventListener("keydown", (event) => {
      const key = event.key.toLowerCase();
      const typing = ["INPUT", "TEXTAREA"].includes(document.activeElement?.tagName || "");
      if (typing) {
        if (key === "escape") document.activeElement.blur();
        return;
      }
      if (["w", "a", "s", "d", "arrowup", "arrowdown", "arrowleft", "arrowright"].includes(key)) {
        keys.add(key);
        event.preventDefault();
      }
      if (key === "escape") resetCamera();
      if (key === "q") sendGuideToExhibit(activeIndex - 1, true);
      if (key === "e") sendGuideToExhibit(activeIndex + 1, true);
    });
    window.addEventListener("keyup", (event) => {
      keys.delete(event.key.toLowerCase());
    });

    setInterval(() => {
      els.clock.textContent = new Date().toLocaleTimeString("zh-CN", { hour12: false });
    }, 1000);
    els.clock.textContent = new Date().toLocaleTimeString("zh-CN", { hour12: false });
    resize();
    loadData();
    revealUi(3600);
    requestAnimationFrame(animate);
  </script>
</body>
</html>
